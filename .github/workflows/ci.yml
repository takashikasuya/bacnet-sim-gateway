name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token (read-only); no job needs write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync
      - name: Ruff (lint)
        run: uv run ruff check
      - name: Ruff (format)
        run: uv run ruff format --check
      - name: Mypy
        run: uv run mypy
      - name: Pytest (unit + loopback, excludes integration)
        run: uv run pytest --cov=src/bbc_sim --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync
      - name: Start Mosquitto (anonymous)
        run: |
          docker run -d --name mosquitto -p 127.0.0.1:1883:1883 \
            -v "$PWD/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          sleep 3
      - name: Pytest (integration only)
        run: uv run pytest -m integration
