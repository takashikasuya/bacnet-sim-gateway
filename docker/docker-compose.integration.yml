# Integration environment (EP-004): B-BC in gateway mode + MQTT broker + a mock
# southbound device and a mock upper consumer. Hono/Ditto/Building OS are represented
# by mocks/manual steps (real systems are out of scope to run in CI; see README).
#
# Usage: docker compose -f docker/docker-compose.integration.yml up --build
services:
  mosquitto:
    image: eclipse-mosquitto:2
    network_mode: host
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  bbc-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host  # BACnet/IP broadcast (ADR-008, pitfalls.md)
    depends_on: [mosquitto]
    volumes:
      - ../config:/app/config:ro
    command:
      - run
      - --config
      - config/simulator.yaml
      - --mode
      - gateway
      - --transport
      - mqtt://127.0.0.1:1883
      - --rest-port
      - "8080"

  # EP-008 BOWS connector: read the B-BC over BACnet and publish Building OS
  # bacnet-device-message telemetry to Mosquitto (telemetry/{tenant}/{deviceId}).
  bows:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host  # BACnet/IP discovery of the B-BC
    depends_on: [bbc-sim, mosquitto]
    command:
      - bows
      - run
      - --target
      - 127.0.0.1:47808
      - --device-id
      - bbc-local-001
      - --tenant
      - default
      - --transport
      - mqtt://127.0.0.1:1883
      - --interval
      - "10"
