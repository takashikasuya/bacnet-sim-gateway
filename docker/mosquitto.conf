# Container-internal broker for local/CI integration only. Listens on the container's
# 0.0.0.0 so the published port can forward to it; host exposure is constrained by binding
# the published port to 127.0.0.1 (see .github/workflows/ci.yml) and by host networking
# in docker-compose.integration.yml. Not for production.
listener 1883
allow_anonymous true
