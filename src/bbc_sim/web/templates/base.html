<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}bbc-sim Admin{% endblock %}</title>
  <link rel="stylesheet" href="/ui/static/app.css">
</head>
<body>
<nav class="nav">
  <span class="nav-brand">🏢 bbc-sim</span>
  <span class="nav-mode mode-{{ mode }}">{{ mode }}</span>
  <a href="/ui/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
  <a href="/ui/devices" class="nav-link {% if page == 'devices' %}active{% endif %}">デバイス/オブジェクト</a>
  <a href="/ui/bindings" class="nav-link {% if page == 'bindings' %}active{% endif %}">バインディング</a>
  <a href="/ui/status" class="nav-link {% if page == 'status' %}active{% endif %}">接続状態</a>
  <a href="/ui/logs" class="nav-link {% if page == 'logs' %}active{% endif %}">ログ</a>
  <a href="/ui/pointlist" class="nav-link {% if page == 'pointlist' %}active{% endif %}">点リスト</a>
  <a href="/ui/help" class="nav-link {% if page == 'help' %}active{% endif %}" title="ヘルプ">?</a>
</nav>
<main class="main">
  {% block content %}{% endblock %}
</main>
{% include "partials/_tour.html" %}
<script src="/ui/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
